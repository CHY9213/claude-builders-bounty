name: PR Review (claude-review-agent)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PR Review Analysis
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 agents/pr-reviewer/claude-review.py \
            --pr "${{ github.event.pull_request.html_url }}" \
            -o review-output.md

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review-output.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Alternative: post as PR review instead of a comment
  review-as-pr-review:
    runs-on: ubuntu-latest
    needs: review
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run and post as PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 agents/pr-reviewer/claude-review.py \
            --pr "${{ github.event.pull_request.html_url }}" \
            -o review-output.md
          echo "REVIEW_BODY<<EOF" >> $GITHUB_ENV
          cat review-output.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Submit PR Review
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.REVIEW_BODY;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body,
              event: 'COMMENT'
            });
