name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code PR Review
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            // Download the review agent
            execSync('curl -sLO https://raw.githubusercontent.com/CHY9213/claude-builders-bounty/main/templates/review-agent/claude-review.py');
            
            // Run the review
            const prUrl = `https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}`;
            const output = execSync(`python3 claude-review.py --pr "${prUrl}"`, { encoding: 'utf-8' });
            
            // Find the report section
            const lines = output.split('\n');
            const reportStart = lines.findIndex(l => l === '# PR Review Report');
            const report = lines.slice(reportStart).join('\n');
            
            // Post as PR comment
            if (report) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }
